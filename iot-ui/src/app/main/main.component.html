<div class="app-shell">
  <!-- ── Sidebar ────────────────────────────────────────────────── -->
  <nav class="sidebar">
    <div class="sidebar-brand" (click)="onMenuSelect('dashboard')">
      <img src="assets/iot-logo.svg" width="36" height="36" alt="IoT" />
      <span class="brand-text">IoT Manager</span>
    </div>

    <ng-container *ngFor="let m of navMenus; let i = index; let last = last">
      <!-- Parent item -->
      <a class="nav-item"
         [class.active]="selectedMenu === m.id && !selectedSubNav"
         [class.expanded]="expandedMenu === m.id"
         [class.has-children]="m.children.length"
         (click)="m.children.length ? toggleMenu(m.id) : onMenuSelect(m.id)">
        <img [src]="m.svg" class="nav-icon" alt="" />
        <span>{{ m.label }}</span>
        <clr-icon *ngIf="m.children.length"
                  class="expand-chevron"
                  [attr.shape]="expandedMenu === m.id ? 'angle-down' : 'angle-right'">
        </clr-icon>
      </a>

      <!-- Children -->
      <div class="tree-children" *ngIf="m.children.length && expandedMenu === m.id">
        <a class="nav-child" *ngFor="let c of m.children; let clast = last"
           [class.active]="selectedMenu === m.id && selectedSubNav === c.id"
           [class.tree-last]="clast"
           (click)="onChildSelect(m.id, c.id)">
          <span class="child-dot"></span>
          {{ c.label }}
        </a>
      </div>
    </ng-container>

    <div class="sidebar-spacer"></div>

    <a class="nav-item" (click)="theme.toggle()" title="Toggle theme">
      <img [src]="theme.dark ? 'assets/icons/sun.svg' : 'assets/icons/moon.svg'" class="nav-icon" alt="" />
      <span>{{ theme.dark ? 'Light' : 'Dark' }}</span>
    </a>

    <a class="nav-item" [class.active]="debug.on" (click)="debug.toggle()"
       title="Show the data-store key under each form field">
      <img src="assets/icons/debug.svg" class="nav-icon" alt="" />
      <span>{{ debug.on ? 'Debug Off' : 'Debug' }}</span>
    </a>

    <a class="nav-item nav-logout" (click)="onLogout()">
      <img src="assets/icons/logout.svg" class="nav-icon" alt="" />
      <span>Sign out</span>
    </a>
    <div class="nav-version" *ngIf="version" title="Running release">
      <img src="assets/icons/version.svg" class="nav-icon" alt="" /><span>v{{ version }}</span>
    </div>
  </nav>

  <!-- ── Main area ──────────────────────────────────────────────── -->
  <div class="main-area">
    <!-- Live strip -->
    <div class="live-strip">
      <div class="live-tag">
        <span class="live-pulse"></span>
        <span class="live-label">LIVE</span>
      </div>
      <span class="live-date">{{ today }}</span>

      <app-status-badge icon="cloud" [label]="'LwM2M ' + lwm2mState" [state]="lwm2mBadgeState"></app-status-badge>
      <app-status-badge icon="shield" [label]="'VPN ' + vpnState" [state]="vpnState"></app-status-badge>
      <app-status-badge icon="wifi" [label]="'WiFi ' + wifiState" [state]="wifiState"></app-status-badge>
      <span class="live-stat"><clr-icon shape="world"></clr-icon> {{ wanIface }}</span>
      <span class="live-stat"><clr-icon shape="cog"></clr-icon> {{ serviceCount }} services</span>
      <span class="live-stat" *ngIf="deviceUptime"><clr-icon shape="clock"></clr-icon> up {{ deviceUptime }}</span>
      <span class="access-badge" [class.viewer]="!isAdmin">{{ isAdmin ? 'Admin' : 'Viewer' }}</span>

      <div class="live-spacer"></div>
      <button class="refresh-btn" (click)="refreshStatus()" title="Refresh">
        <clr-icon shape="sync"></clr-icon>
      </button>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Dashboard -->
      <app-dashboard *ngIf="selectedMenu==='dashboard'"></app-dashboard>

      <!-- HTTP -->
      <app-http-config *ngIf="selectedMenu==='http'"></app-http-config>

      <!-- VPN -->
      <ng-container *ngIf="selectedMenu==='vpn'">
        <app-vpn-config *ngIf="!selectedSubNav || selectedSubNav==='config'"></app-vpn-config>
        <app-vpn-status *ngIf="selectedSubNav==='status'"></app-vpn-status>
      </ng-container>

      <!-- WAN -->
      <ng-container *ngIf="selectedMenu==='wan'">
        <app-wifi-config    *ngIf="!selectedSubNav || selectedSubNav==='wifi'"></app-wifi-config>
        <app-wifi-scan      *ngIf="selectedSubNav==='scan'"></app-wifi-scan>
        <app-iface-priority *ngIf="selectedSubNav==='priority'"></app-iface-priority>
      </ng-container>

      <!-- Routing -->
      <ng-container *ngIf="selectedMenu==='routing'">
        <app-port-forward [view]="selectedSubNav==='dnat' ? 'dnat' : 'ports'" *ngIf="!selectedSubNav || selectedSubNav==='ports' || selectedSubNav==='dnat'"></app-port-forward>
        <app-custom-rules *ngIf="selectedSubNav==='rules'"></app-custom-rules>
      </ng-container>

      <!-- LwM2M -->
      <ng-container *ngIf="selectedMenu==='lwm2m'">
        <app-lwm2m-config [mode]="selectedSubNav==='security' ? 'security' : 'server'"></app-lwm2m-config>
      </ng-container>

      <!-- Services -->
      <ng-container *ngIf="selectedMenu==='services'">
        <app-services-list *ngIf="!selectedSubNav || selectedSubNav==='list'"></app-services-list>
      </ng-container>

      <!-- Logs -->
      <app-log-viewer *ngIf="selectedMenu==='logs'"></app-log-viewer>

      <!-- Users -->
      <app-users *ngIf="selectedMenu==='users'"></app-users>

      <!-- Software Update -->
      <app-software-update *ngIf="selectedMenu==='software'"></app-software-update>

      <!-- Terminal (remote shell) -->
      <app-shell *ngIf="selectedMenu==='shell' && shellEnabled && isAdmin"></app-shell>
    </div>
  </div>
</div>
