# docker-compose.yml — IoT Device stack (dev / e2e, no RPi3B board)
#
# Brings up the device-side daemons as separate containers sharing the
# ds-server Unix socket on the dev-run volume — the same wiring that runs
# on a real board under systemd. The device is CLIENT-ONLY: it registers
# against a cloud (apps/cloud) LwM2M Bootstrap/DM server. It never runs an
# LwM2M server itself (that role belongs to the cloud).
#
#   ds-server     → shared data store (IPC backbone)
#   lwm2m-client  → device client: bootstraps from the cloud BS, registers to DM
#   iot-httpd     → device REST API (/api/v1/*) + device UI (served at /)
#
# Point the client at your cloud Bootstrap server with DEVICE_BS_URI (the
# cloud compose publishes BS on 5684/DM on 5683 to the host;
# host.docker.internal resolves via the host-gateway extra_hosts entry):
#   DEVICE_BS_URI=coaps://host.docker.internal:5684 ./run.sh
#
# Usage:
#   docker compose up -d
#   docker compose logs -f lwm2m-client
#   docker compose down
#
#   HTTP_PORT=8081 docker compose up -d   # custom host port for the UI

version: "3.8"

services:
  # ── Data Store (IPC backbone) ──────────────────────────────────
  ds-server:
    image: ${DEVICE_IMAGE:-docker.io/naushada/iot-device:latest}
    container_name: iot-dev-ds
    command: >
      ds-server
      ds-socket=/run/iot/data_store.sock
      ds-store=/var/lib/iot/data_store.lua
      ds-schema-dir=/etc/iot/ds-schemas
      ds-socket-group=iot
    volumes:
      - dev-run:/run/iot
      - dev-etc:/etc/iot
      - dev-lib:/var/lib/iot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ds-cli", "--socket=/run/iot/data_store.sock", "get", "log.version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Device LwM2M client (registers against the cloud BS/DM) ────
  # Runs as `engineer` (primary group engineer, supplementary iot) — same
  # as iot-lwm2m-client.service on the SD-card/systemd build. gid:engineer
  # lets it read/write the PSK keys; supplementary `iot` lets it reach the
  # ds socket (group iot, ds-socket-group=iot on ds-server).
  lwm2m-client:
    image: ${DEVICE_IMAGE:-docker.io/naushada/iot-device:latest}
    container_name: iot-dev-lwm2m-client
    user: "engineer:engineer"
    group_add:
      - iot
    # Fully ds-driven: no CLI args. The binary defaults role=client, binds
    # coaps://0.0.0.0:5684, reads config from /etc/iot/config, connects to the
    # default ds socket, and reads the bootstrap URI (iot.bs.uri) + BS PSK
    # (iot.bs.psk.*) + endpoint (iot.endpoint) from the data-store — all
    # commissioned via device-ui in commissioning mode. Running as `engineer`
    # is what lets it read those gid:engineer keys. An unprovisioned device
    # won't connect (by design): commission it first (./run.sh commission on,
    # then set serial + bootstrap URI + generate BS PSK in device-ui).
    command: lwm2m
    # host.docker.internal → the host, so a bootstrap URI of
    # coaps://host.docker.internal:5684 reaches the cloud stack's published BS.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dev-run:/run/iot
      - dev-etc:/etc/iot
      # The lwm2m client materialises the cloud-pushed cert family (LwM2M
      # Object 2048) into this shared volume, which openvpn-client reads and
      # cert-watcher watches. Mounted rw here, ro on openvpn-client.
      - dev-vpn-certs:/etc/iot/vpn
    depends_on:
      ds-server:
        condition: service_healthy
    restart: unless-stopped

  # ── VPN config seed (one-shot, declarative) ───────────────────
  # Replaces the old ad-hoc "seed keys by hand" shell step. Sets the
  # vpn.* config + opens the gate, then exits. In production these come
  # from provisioning/net-router; here they're env-driven so the compose
  # is self-contained. cert.path/key.path/ca.path point at the shared
  # dev-vpn-certs volume the cert-watcher populates.
  vpn-config:
    image: ${DEVICE_IMAGE:-docker.io/naushada/iot-device:latest}
    container_name: iot-dev-vpn-config
    entrypoint: ["sh", "-c"]
    command:
      - |
        S=--socket=/run/iot/data_store.sock
        set -e
        ds-cli $$S set vpn.remote.host  '"'"${VPN_REMOTE_HOST:-host.docker.internal}"'"'
        ds-cli $$S set vpn.remote.port  ${VPN_REMOTE_PORT:-1194}
        ds-cli $$S set vpn.remote.proto '"tcp-client"'
        ds-cli $$S set vpn.cert.path    '"/etc/iot/vpn/client.crt"'
        ds-cli $$S set vpn.key.path     '"/etc/iot/vpn/client.key"'
        ds-cli $$S set vpn.ca.path      '"/etc/iot/vpn/ca.crt"'
        ds-cli $$S set vpn.cipher       '"AES-256-GCM"'
        # Gate: in production net-router publishes these; seed for dev so
        # the WAN/dep gate opens. Add a net-router service to own them live.
        ds-cli $$S set services.net.router.state '"running"'
        ds-cli $$S set net.iface.active '"eth0"'
        echo "vpn-config: seeded vpn.* + opened gate"
    volumes:
      - dev-run:/run/iot
    depends_on:
      ds-server:
        condition: service_healthy
    restart: "no"

  # ── OpenVPN client (peer daemon; spawns + supervises openvpn(8)) ─
  # Not managed by lwm2m — a sibling daemon coordinating only via ds.
  # IOT_ROLE=ovpn → iot-entrypoint runs openvpn-client with
  # OPENVPN_CLIENT_ARGS from /etc/iot/openvpn-client.env. Reads cert
  # files from the dev-vpn-certs volume (rotated by cert-watcher).
  openvpn-client:
    image: ${DEVICE_IMAGE:-docker.io/naushada/iot-device:latest}
    container_name: iot-dev-ovpn
    environment:
      - IOT_ROLE=ovpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dev-run:/run/iot
      - dev-vpn-certs:/etc/iot/vpn:ro
    depends_on:
      ds-server:
        condition: service_healthy
      vpn-config:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Cert sidecar (xpmile pattern, iot-native reload) ───────────
  # Watches the shared cert volume; on any change to the VPN cert family
  # it flips services.openvpn.client.enable false->true via ds-cli, and
  # the openvpn-client Supervisor's ServiceGate reaps + respawns
  # openvpn(8) so it re-reads the rotated certs — same "rotate by reload"
  # intent as xpmile's wsdbagent watcher, but over pure ds coordination
  # (no container-engine socket needed). Uses the device image for ds-cli
  # + busybox find/md5sum. The cert SOURCE is external: iot-cloudd mints a
  # per-device VPN client cert and the provisioning/ds delivery writes it
  # into dev-vpn-certs, which trips this watcher. (Set RELOAD_MODE=restart
  # + mount the engine socket for the xpmile container-restart variant on
  # Linux device hosts.)
  cert-watcher:
    image: ${DEVICE_IMAGE:-docker.io/naushada/iot-device:latest}
    container_name: iot-dev-cert-watcher
    entrypoint: ["sh", "/cert-watcher.sh"]
    environment:
      - WATCH_DIR=/watch
      - RELOAD_MODE=gate
      - DS_SOCK=/run/iot/data_store.sock
      - SVC_NAME=openvpn.client
      - POLL_SECONDS=5
    volumes:
      - dev-vpn-certs:/watch
      - dev-run:/run/iot
      - ./cert-watcher.sh:/cert-watcher.sh:ro
    depends_on:
      - openvpn-client
    restart: unless-stopped

  # ── HTTP Server (device REST API + device UI) ──────────────────
  iot-httpd:
    image: ${DEVICE_IMAGE:-docker.io/naushada/iot-device:latest}
    container_name: iot-dev-httpd
    command: >
      iot-httpd
      ds-socket=/run/iot/data_store.sock
      http-port=8080
      http-workers=${HTTP_WORKERS:-4}
      www-dir=/usr/share/iot/www
    ports:
      - "${HTTP_PORT:-8081}:8080"
    volumes:
      - dev-run:/run/iot
    depends_on:
      ds-server:
        condition: service_healthy
    restart: unless-stopped

# ── Shared volumes ──────────────────────────────────────────────
volumes:
  dev-run:       # Unix socket (ds-server ↔ all daemons)
  dev-etc:       # Schemas, env files, LwM2M object config
  dev-lib:       # Persisted data store
  dev-vpn-certs: # VPN client cert family (ca.crt/client.crt/client.key);
                 # populated by cert-watcher / provisioning, read by openvpn-client
