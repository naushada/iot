<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-brand" (click)="onMenuSelect('dashboard')">
      <img src="assets/iot-logo.svg" width="36" height="36" alt="IoT" />
      <span class="brand-text">IoT Cloud</span>
    </div>
    <a class="nav-item" *ngFor="let m of menus; let i = index"
       [class.active]="selectedMenu===m.id" [class.dragging]="dragIndex===i"
       draggable="true" (dragstart)="onDragStart(i)"
       (dragover)="onDragOver($event, i)" (dragend)="onDragEnd()"
       (click)="onMenuSelect(m.id)" title="Drag to reorder">
      <img [src]="m.svg" class="nav-icon" alt="" /><span>{{m.label}}</span>
    </a>
    <a class="nav-item nav-reset" (click)="resetNav()" title="Reset menu order to default">
      <span class="nav-icon nav-reset-glyph">↺</span><span>Reset order</span>
    </a>
    <div class="sidebar-spacer"></div>
    <a class="nav-item" (click)="theme.toggle()" title="Toggle theme">
      <img [src]="theme.dark ? 'assets/icons/sun.svg' : 'assets/icons/moon.svg'" class="nav-icon" alt="" /><span>{{theme.dark ? 'Light' : 'Dark'}}</span>
    </a>
    <a class="nav-item" [class.active]="debug.on" (click)="debug.toggle()"
       title="Show the data-store key under each form field">
      <img src="assets/icons/debug.svg" class="nav-icon" alt="" /><span>{{debug.on ? 'Debug Off' : 'Debug'}}</span>
    </a>
    <a class="nav-item nav-logout" (click)="onLogout()"><img src="assets/icons/logout.svg" class="nav-icon" alt="" /><span>Sign out</span></a>
    <div class="nav-version" *ngIf="version" title="Running release">
      <img src="assets/icons/version.svg" class="nav-icon" alt="" /><span>v{{ version }}</span>
    </div>
  </nav>
  <div class="main-area">
    <div class="live-strip">
      <span class="live-tag"><span class="live-pulse"></span><span class="live-label">CLOUD</span></span>
      <div class="live-spacer"></div>
    </div>
    <div class="content">
      <app-dashboard *ngIf="selectedMenu==='dashboard'"></app-dashboard>
      <app-endpoint-list *ngIf="selectedMenu==='endpoints'" (showOnMap)="goToMap($event)"></app-endpoint-list>
      <app-map *ngIf="selectedMenu==='map'" [focus]="mapFocus"></app-map>

      <!-- VPN (server-side) -->
      <ng-container *ngIf="selectedMenu==='vpn'">
        <app-vpn-submenu (nav)="onSubNavSelect($event)"></app-vpn-submenu>
        <div class="content-area">
          <app-vpn-config *ngIf="!selectedSubNav || selectedSubNav==='config'"></app-vpn-config>
          <app-vpn-status *ngIf="selectedSubNav==='status'"></app-vpn-status>
        </div>
      </ng-container>

      <!-- HTTP Server Config -->
      <app-http-config *ngIf="selectedMenu==='http'"></app-http-config>

      <!-- Routing (from iot-ui) -->
      <ng-container *ngIf="selectedMenu==='routing'">
        <app-routing-submenu (nav)="onSubNavSelect($event)"></app-routing-submenu>
        <div class="content-area">
          <app-device-forwarding *ngIf="!selectedSubNav || selectedSubNav==='forward'"></app-device-forwarding>
          <app-custom-rules *ngIf="selectedSubNav==='rules'"></app-custom-rules>
        </div>
      </ng-container>

      <!-- LwM2M — DM (Device Management) + BS (Bootstrap Server) -->
      <ng-container *ngIf="selectedMenu==='lwm2m'">
        <app-lwm2m-submenu (nav)="onSubNavSelect($event)"></app-lwm2m-submenu>
        <div class="content-area">
          <app-lwm2m-config *ngIf="!selectedSubNav || selectedSubNav==='dm'"></app-lwm2m-config>
          <app-bs-config     *ngIf="selectedSubNav==='bs'"></app-bs-config>
        </div>
      </ng-container>

      <!-- Services (from iot-ui) -->
      <ng-container *ngIf="selectedMenu==='services'">
        <app-services-submenu (nav)="onSubNavSelect($event)"></app-services-submenu>
        <div class="content-area">
          <app-services-list *ngIf="!selectedSubNav || selectedSubNav==='list'"></app-services-list>
        </div>
      </ng-container>

      <app-log-viewer *ngIf="selectedMenu==='logs'"></app-log-viewer>

      <!-- Users -->
      <app-users *ngIf="selectedMenu==='users'"></app-users>

      <!-- Tenants (multi-tenant operator console) -->
      <app-tenants *ngIf="selectedMenu==='tenants'"></app-tenants>

      <!-- Software Update -->
      <app-software-update *ngIf="selectedMenu==='software'"></app-software-update>
    </div>
  </div>
</div>
