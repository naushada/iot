<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-brand" (click)="onMenuSelect('dashboard')">
      <img src="assets/iot-logo.svg" width="36" height="36" alt="IoT" />
      <span class="brand-text">IoT Cloud</span>
    </div>
    <a class="nav-item" *ngFor="let m of menus" [class.active]="selectedMenu===m.id" (click)="onMenuSelect(m.id)">
      <img [src]="m.svg" class="nav-icon" alt="" /><span>{{m.label}}</span>
    </a>
    <div class="sidebar-spacer"></div>
    <a class="nav-item" (click)="theme.toggle()" title="Toggle theme">
      <clr-icon [attr.shape]="theme.dark ? 'sun' : 'moon'"></clr-icon><span>{{theme.dark ? 'Light' : 'Dark'}}</span>
    </a>
    <a class="nav-item nav-logout" (click)="onLogout()"><clr-icon shape="logout"></clr-icon><span>Sign out</span></a>
  </nav>
  <div class="main-area">
    <div class="live-strip">
      <span class="live-tag"><span class="live-pulse"></span><span class="live-label">CLOUD</span></span>
      <div class="live-spacer"></div>
    </div>
    <div class="content">
      <app-dashboard *ngIf="selectedMenu==='dashboard'"></app-dashboard>
      <app-endpoint-list *ngIf="selectedMenu==='endpoints'"></app-endpoint-list>

      <!-- VPN (server-side) -->
      <ng-container *ngIf="selectedMenu==='vpn'">
        <app-vpn-submenu (nav)="onSubNavSelect($event)"></app-vpn-submenu>
        <div class="content-area">
          <app-vpn-config *ngIf="!selectedSubNav || selectedSubNav==='config'"></app-vpn-config>
          <app-vpn-status *ngIf="selectedSubNav==='status'"></app-vpn-status>
        </div>
      </ng-container>

      <!-- HTTP Server Config -->
      <app-http-config *ngIf="selectedMenu==='http'"></app-http-config>

      <!-- WAN (from iot-ui) -->
      <ng-container *ngIf="selectedMenu==='wan'">
        <app-wan-submenu (nav)="onSubNavSelect($event)"></app-wan-submenu>
        <div class="content-area">
          <app-wifi-config    *ngIf="!selectedSubNav || selectedSubNav==='wifi'"></app-wifi-config>
          <app-wifi-scan      *ngIf="selectedSubNav==='scan'"></app-wifi-scan>
          <app-iface-priority *ngIf="selectedSubNav==='priority'"></app-iface-priority>
        </div>
      </ng-container>

      <!-- Routing (from iot-ui) -->
      <ng-container *ngIf="selectedMenu==='routing'">
        <app-routing-submenu (nav)="onSubNavSelect($event)"></app-routing-submenu>
        <div class="content-area">
          <app-port-forward *ngIf="!selectedSubNav || selectedSubNav==='ports' || selectedSubNav==='dnat'"></app-port-forward>
          <app-custom-rules *ngIf="selectedSubNav==='rules'"></app-custom-rules>
        </div>
      </ng-container>

      <!-- LwM2M — DM (Device Management) + BS (Bootstrap Server) -->
      <ng-container *ngIf="selectedMenu==='lwm2m'">
        <app-lwm2m-submenu (nav)="onSubNavSelect($event)"></app-lwm2m-submenu>
        <div class="content-area">
          <app-lwm2m-config *ngIf="!selectedSubNav || selectedSubNav==='dm'"></app-lwm2m-config>
          <app-bs-config     *ngIf="selectedSubNav==='bs'"></app-bs-config>
        </div>
      </ng-container>

      <!-- Services (from iot-ui) -->
      <ng-container *ngIf="selectedMenu==='services'">
        <app-services-submenu (nav)="onSubNavSelect($event)"></app-services-submenu>
        <div class="content-area">
          <app-services-list *ngIf="!selectedSubNav || selectedSubNav==='list'"></app-services-list>
        </div>
      </ng-container>

      <app-log-viewer *ngIf="selectedMenu==='logs'"></app-log-viewer>

      <!-- Users -->
      <app-users *ngIf="selectedMenu==='users'"></app-users>
    </div>
  </div>
</div>
