<div class="page">
  <h3>WiFi Configuration</h3>

  <form [formGroup]="form" (ngSubmit)="save()" *ngIf="!loading">
    <div class="form-grid">
      <clr-input-container>
        <label>Interface</label>
        <input clrInput [disabled]="!isAdmin" formControlName="iface" placeholder="wlan0" />
      </clr-input-container>
      <clr-input-container>
        <label>wpa_supplicant Path</label>
        <input clrInput [disabled]="!isAdmin" formControlName="wpa_path" placeholder="/usr/sbin/wpa_supplicant" />
      </clr-input-container>
      <clr-input-container>
        <label>Control Directory</label>
        <input clrInput [disabled]="!isAdmin" formControlName="ctrl_dir" placeholder="/run/wpa_supplicant" />
      </clr-input-container>
      <clr-select-container>
        <label>DHCP Client</label>
        <select clrSelect [disabled]="!isAdmin" formControlName="dhcp_client">
          <option value="auto">auto</option><option value="udhcpc">udhcpc</option><option value="dhclient">dhclient</option>
        </select>
      </clr-select-container>
      <clr-input-container>
        <label>Scan Interval (s)</label>
        <input clrInput [disabled]="!isAdmin" type="number" formControlName="scan_interval" />
      </clr-input-container>
      <clr-input-container>
        <label>Max Scan Results</label>
        <input clrInput [disabled]="!isAdmin" type="number" formControlName="scan_max_results" />
      </clr-input-container>
    </div>

    <h4 style="margin-top:24px;">Saved Networks</h4>
    <clr-datagrid>
      <clr-dg-column>SSID</clr-dg-column>
      <clr-dg-column>PSK</clr-dg-column>
      <clr-dg-column>Priority</clr-dg-column>
      <clr-dg-column>Key Mgmt</clr-dg-column>
      <clr-dg-column *ngIf="isAdmin">Actions</clr-dg-column>

      <clr-dg-row *clrDgItems="let n of networks; let i=index">
        <clr-dg-cell><input class="clr-input" [disabled]="!isAdmin" [(ngModel)]="n.ssid" [name]="'ssid-'+i" placeholder="MyWiFi" /></clr-dg-cell>
        <clr-dg-cell><input class="clr-input" [disabled]="!isAdmin" type="password" [(ngModel)]="n.psk" [name]="'psk-'+i" placeholder="passphrase" /></clr-dg-cell>
        <clr-dg-cell><input class="clr-input" [disabled]="!isAdmin" type="number" [(ngModel)]="n.priority" [name]="'pri-'+i" style="width:80px;" /></clr-dg-cell>
        <clr-dg-cell><select class="clr-select" [disabled]="!isAdmin" [(ngModel)]="n.key_mgmt" [name]="'km-'+i">
          <option value="WPA2-PSK">WPA2-PSK</option><option value="WPA-PSK">WPA-PSK</option><option value="NONE">Open</option>
        </select></clr-dg-cell>
        <clr-dg-cell *ngIf="isAdmin"><button type="button" class="btn btn-sm btn-danger" (click)="removeNetwork(i)">Remove</button></clr-dg-cell>
      </clr-dg-row>

      <clr-dg-footer>
        {{ networks.length }} networks
        <button type="button" class="btn btn-sm" *ngIf="isAdmin" (click)="addNetwork()" style="margin-left:12px;">+ Add Network</button>
      </clr-dg-footer>
    </clr-datagrid>

    <div style="margin-top:20px;" *ngIf="isAdmin">
      <button type="submit" class="btn btn-primary" [disabled]="saving">{{ saving ? 'Saving…' : 'Save' }}</button>
      <span *ngIf="msg" style="margin-left:12px;" [style.color]="msg==='Saved.'?'#2e7d32':'#c62828'">{{ msg }}</span>
    </div>
  </form>
</div>
