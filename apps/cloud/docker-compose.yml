# docker-compose.yml — IoT Cloud services
#
# Spawns ds-server (IPC backbone), iot-cloudd (LwM2M/VPN/provision),
# and iot-httpd (REST API + cloud UI).  All daemons communicate
# through ds-server via the Unix socket shared on the iot-run volume.
#
# Usage:
#   docker compose up -d              # start all services
#   docker compose logs -f iot-httpd  # tail httpd logs
#   docker compose down               # stop and remove
#
#   HTTP_PORT=8443 docker compose up -d  # custom HTTP port

services:
  # ── Data Store (IPC backbone) ──────────────────────────────────
  ds-server:
    image: ${CLOUD_IMAGE:-docker.io/naushada/iot-cloud:latest}
    container_name: iot-ds-server
    command: >
      ds-server
      --socket=/var/run/iot/data_store.sock
      --schema-dir=/etc/iot/ds-schemas
      --persist-dir=/var/lib/iot
      ds-socket-group=cloud-svc
    volumes:
      - iot-run:/var/run/iot
      - iot-etc:/etc/iot
      - iot-lib:/var/lib/iot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ds-cli", "--socket=/var/run/iot/data_store.sock", "get", "iot.version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Cloud Daemon (LwM2M BS/DM, VPN registry, provision) ────────
  iot-cloudd:
    image: ${CLOUD_IMAGE:-docker.io/naushada/iot-cloud:latest}
    container_name: iot-cloudd
    command: >
      iot-cloudd
      ds-socket=/var/run/iot/data_store.sock
      proxy-start=${PROXY_START:-10000}
      proxy-end=${PROXY_END:-10050}
      sync-interval=5
    volumes:
      - iot-run:/var/run/iot
      - iot-etc:/etc/iot
      - iot-vpn:/etc/iot/vpn
      - iot-ca-key:/run/secrets/iot-ca-key:ro
      # On transfer-out, iot-cloudd queues the released serial here for the
      # mongo-capable iot-telemetry-ingest sidecar to purge from the 60-day
      # history (iot-cloudd has no mongo driver). Shared with iot-httpd + ingest.
      - iot-telemetry-spool:/var/lib/iot/telemetry-spool
    cap_add:
      - NET_ADMIN           # openvpn tun + per-device nftables DNAT
    sysctls:
      - net.ipv4.ip_forward=1   # route the DNAT'd device-UI flow over the tunnel
    devices:
      - /dev/net/tun        # openvpn(8) server spawned by iot-cloudd
    # Publish openvpn (1194) + the per-device device-UI proxy range. Bridge +
    # docker's port-proxy is deliberate: published ports bypass the host ufw,
    # so 1194 + the proxy range are reachable without per-port ufw rules (host
    # networking lost that bypass and ufw — allow-22-only — blocked 1194). The
    # published range must match the ds proxy-port range; both follow
    # PROXY_START/PROXY_END.
    # Also publishes the HTTP port for iot-httpd, which shares THIS container's
    # network namespace (network_mode: service:iot-cloudd) so the device-UI
    # reverse proxy can reach the OpenVPN tun (tun0/10.9.0.x lives here). Mirrors
    # the device stack's httpd↔openvpn-client netns sharing.
    ports:
      - "1194:1194/tcp"
      - "${PROXY_START:-10000}-${PROXY_END:-10050}:${PROXY_START:-10000}-${PROXY_END:-10050}"
      - "${HTTP_PORT:-80}:${HTTP_PORT:-80}"
    depends_on:
      ds-server:
        condition: service_healthy
    restart: unless-stopped

  # ── LwM2M Bootstrap Server (port 5684) ──────────────────────────
  lwm2m-bs:
    image: ${CLOUD_IMAGE:-docker.io/naushada/iot-cloud:latest}
    container_name: iot-lwm2m-bs
    # Runs as cloud-svc so it can read cloud.endpoint.credentials
    # (read_acl=gid:cloud-svc) to register per-device BS PSKs.
    user: "cloud-svc:cloud-svc"
    command: >
      lwm2m
      role=server
      local=coaps://0.0.0.0:5684
      ds-socket=/var/run/iot/data_store.sock
      lwm2m-instance=bs
    ports:
      - "5684:5684/udp"
    volumes:
      - iot-etc:/etc/iot
      - iot-run:/var/run/iot
    depends_on:
      ds-server:
        condition: service_healthy
      iot-cloudd:
        condition: service_started
    restart: unless-stopped

  # ── LwM2M Device Management Server (port 5683) ──────────────────
  lwm2m-dm:
    image: ${CLOUD_IMAGE:-docker.io/naushada/iot-cloud:latest}
    container_name: iot-lwm2m-dm
    # cloud-svc to read cloud.endpoint.credentials (per-device DM PSKs).
    user: "cloud-svc:cloud-svc"
    command: >
      lwm2m
      role=server
      local=coaps://0.0.0.0:5683
      ds-socket=/var/run/iot/data_store.sock
      lwm2m-instance=dm
    ports:
      - "5683:5683/udp"
    volumes:
      - iot-etc:/etc/iot
      - iot-run:/var/run/iot
    depends_on:
      ds-server:
        condition: service_healthy
      iot-cloudd:
        condition: service_started
    restart: unless-stopped

  # ── HTTP Server (REST API + cloud UI + device UI proxy) ────────
  iot-httpd:
    image: ${CLOUD_IMAGE:-docker.io/naushada/iot-cloud:latest}
    container_name: iot-httpd
    command: >
      iot-httpd
      ds-socket=/var/run/iot/data_store.sock
      http-port=${HTTP_PORT:-80}
      http-scheme=${HTTP_SCHEME:-http}
      http-cert=/etc/iot/tls/server.crt
      http-key=/etc/iot/tls/server.key
      www-dir=/usr/share/iot/cloud-www
      firmware-dir=/var/lib/iot/firmware
    # Share iot-cloudd's network namespace so the /dev/<ep>/ device-UI reverse
    # proxy can reach the OpenVPN tun (tun0/10.9.0.x lives in iot-cloudd). The
    # published HTTP port is declared on iot-cloudd (the netns owner); this
    # container therefore declares no ports/networks of its own.
    network_mode: "service:iot-cloudd"
    volumes:
      - iot-run:/var/run/iot
      - iot-firmware:/var/lib/iot/firmware      # OTA .ipk feed (served at /firmware/; RW so the cloud-ui can upload bundles via POST /api/v1/firmware/upload)
      - iot-tls:/etc/iot/tls                    # self-signed cert — auto-provisioned by the image entrypoint
      - iot-telemetry-spool:/var/lib/iot/telemetry-spool  # NDJSON spool: iot-httpd appends cloud.vehicle.telemetry snapshots; iot-telemetry-ingest bulk-loads → Mongo (§3b)
    environment:
      - TLS_HOST=${TLS_HOST:-}                  # cert CN/SAN for https (run.sh passes the host IP)
    depends_on:
      ds-server:
        condition: service_healthy
      iot-cloudd:
        condition: service_started
    restart: unless-stopped

  # ── Auto-deploy (only under the `autodeploy` profile) ─────────
  # Watchtower watches the cloud containers and redeploys them when a new
  # image is published to the tag they run. Run the stack on :stable
  # (CI updates :stable only on git-tag releases — see release-image.yml),
  # so this deploys RELEASES, not every commit. Enable with:
  #     AUTODEPLOY=1 ./run.sh         (run.sh defaults the image to :stable)
  # The httpd ds-connect retry tolerates Watchtower recreating containers
  # out of dependency order.
  # CAVEAT: Watchtower recreates containers but does NOT refresh the
  # iot-etc config volume, so a release that changes ds *schemas* still
  # needs a manual `./run.sh` on the host. Code/UI-only releases are fine.
  # ── Telemetry store (60-day vehicle history; §3b of the TDD) ────
  # x86 VM → mongod 5.0 supports native time-series collections. The
  # iot-telemetry-ingest sidecar bulk-loads vehicle snapshots here from the
  # NDJSON spool iot-httpd writes (no mongo driver in the cloud C++ build); the
  # cold-storage archiver (§3c) mongodumps + prunes aged data. Idle until wired.
  mongo:
    image: docker.io/library/mongo:5.0
    container_name: iot-mongo
    command: ["--bind_ip_all"]
    volumes:
      - iot-mongo:/data/db
      - iot-archive:/archive          # cold-storage archives (operator copies to HDD)
    restart: unless-stopped
    profiles: ["telemetry"]           # opt-in until the ingest pipeline lands

  # ── Self-hosted map tiles (§3d) ────────────────────────────────
  # tileserver-gl serves a region MBTiles extract so the cloud-ui map is
  # first-party (no Google/Mapbox). Seed /data with a region .mbtiles + style.
  tileserver:
    image: docker.io/maptiler/tileserver-gl:latest
    container_name: iot-tileserver
    volumes:
      - iot-tiles:/data               # region .mbtiles + style.json (operator-seeded)
    ports:
      - "${TILESERVER_PORT:-8081}:8080"
    restart: unless-stopped
    profiles: ["telemetry"]           # opt-in; the map page points at this

  # ── Cold-storage archiver (§3c) ────────────────────────────────
  # Monthly: mongodump telemetry older than ARCHIVE_HOT_DAYS → verify → prune,
  # writing archives to the iot-archive volume (operator copies to external HDD).
  # Reuses the mongo image for mongodump/mongosh. Opt-in with the mongo store.
  iot-archiver:
    image: docker.io/library/mongo:5.0
    container_name: iot-archiver
    depends_on: [mongo]
    volumes:
      - iot-archive:/archive
      - ./scripts/iot-telemetry-archiver.sh:/usr/local/bin/iot-telemetry-archiver:ro
    environment:
      - MONGO_HOST=mongo
      - ARCHIVE_HOT_DAYS=${ARCHIVE_HOT_DAYS:-60}
    entrypoint: ["/bin/sh","-c","while true; do /usr/local/bin/iot-telemetry-archiver || true; sleep ${ARCHIVE_INTERVAL_SEC:-2592000}; done"]
    restart: unless-stopped
    profiles: ["telemetry"]

  # ── Telemetry ingest + history export (§3b) ────────────────────
  # Two-way bridge between the iot-httpd NDJSON spool and Mongo (no mongo
  # driver in the cloud C++ build): mongoimport loads each cloud.vehicle.
  # telemetry snapshot iot-httpd appends, and mongoexport dumps a recent window
  # back to history.json, which iot-httpd serves at
  # /api/v1/cloud/telemetry/history for the map's historical-track read-back.
  # iot-httpd opens+appends+closes per snapshot, so the spool rename never races
  # a held descriptor. Reuses the mongo image; logic lives in the mounted
  # iot-telemetry-ingest script (like the archiver). Opt-in with the mongo store.
  iot-telemetry-ingest:
    image: docker.io/library/mongo:5.0
    container_name: iot-telemetry-ingest
    depends_on: [mongo]
    volumes:
      - iot-telemetry-spool:/var/lib/iot/telemetry-spool
      - ./scripts/iot-telemetry-ingest.sh:/usr/local/bin/iot-telemetry-ingest:ro
    environment:
      - MONGO_HOST=mongo
      - TELEMETRY_INGEST_SEC=${TELEMETRY_INGEST_SEC:-30}
      - HISTORY_WINDOW_SEC=${HISTORY_WINDOW_SEC:-86400}
    entrypoint: ["/bin/sh","-c","exec /usr/local/bin/iot-telemetry-ingest"]
    restart: unless-stopped
    profiles: ["telemetry"]

  watchtower:
    image: containrrr/watchtower
    container_name: iot-watchtower
    profiles: ["autodeploy"]
    command: --interval ${WATCHTOWER_INTERVAL:-300} --cleanup iot-ds-server iot-cloudd iot-httpd iot-lwm2m-bs iot-lwm2m-dm
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

# ── Shared volumes ──────────────────────────────────────────────
volumes:
  iot-run:    # Unix socket (ds-server ↔ all daemons)
  iot-etc:    # Schemas, config
  iot-lib:    # Persist directory
  iot-vpn:    # VPN PKI (server certs)
  iot-ca-key: # CA private key (secret — auto-generated on first run)
  iot-firmware: # OTA .ipk packages (seeded by operator; served by iot-httpd)
  iot-tls:    # self-signed https cert (auto-provisioned by the image entrypoint)
  iot-mongo:    # 60-day vehicle telemetry time-series store (§3b)
  iot-telemetry-spool:  # NDJSON hand-off: iot-httpd writer → iot-telemetry-ingest reader (§3b)
  iot-archive:  # cold-storage telemetry archives (mongodump, §3c → external HDD)
  iot-tiles:    # self-hosted map tiles (region .mbtiles + style, §3d)
