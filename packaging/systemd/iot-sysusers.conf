# systemd-sysusers drop-in — static accounts for the IoT stack.
# Install to /usr/lib/sysusers.d/iot.conf; `systemd-sysusers` creates
# these idempotently at boot / package install.
#
# PSK provisioning (apps/docs/tdd-psk-provisioning.md):
#   * `engineer` is the static, no-login account the LwM2M client runs
#     as. The data-store read_acl/write_acl on the PSK keys name
#     `gid:engineer`, so the client (primary group engineer) can read
#     the secrets while ds-cli run as root cannot.
#   * `iot` is a shared group used purely for ds-socket access. ds-server
#     (DynamicUser) chgrp's its 0660 socket to `iot`; members can
#     connect. `engineer` is added to `iot` so the client can reach the
#     socket without widening the socket's mode.
#
# Type Name      ID   GECOS                       Home  Shell
g      iot       -    -
u      engineer  -    "IoT LwM2M client"          -     /usr/sbin/nologin
m      engineer  iot
