# kas-iot.yml — Yocto build configuration for the iot LwM2M stack
#
# Uses kas (https://github.com/siemens/kas) to fetch all layers and
# drive bitbake. This is an alternative to the Containerfile/entrypoint.sh
# build path that build.sh uses by default; the two are kept in sync.
#
#   kas build yocto/kas-iot.yml                       # raspberrypi3-64
#   MACHINE=qemuarm64 kas build yocto/kas-iot.yml     # ARM64 (qemu)
#
# Supported machines:
#   raspberrypi3-64  Raspberry Pi 3B (64-bit, default)
#   qemuarm64        ARM64 / aarch64 (qemu)
#   qemux86-64       x86-64 (qemu, CI verification)
#
# Default target `iot-image` is the full bootable distribution. For just
# the .ipk feed, run `kas build yocto/kas-iot.yml:packagegroup-iot`.

header:
  version: 14

# Default values — override via environment or --target
defaults:
  repos:
    refspec: scarthgap

# Layer repositories fetched by kas
repos:
  # Poky — the Yocto reference distro
  poky:
    url: https://git.yoctoproject.org/poky
    refspec: scarthgap
    layers:
      meta:
      meta-poky:

  # meta-openembedded — lua, nlohmann-json, gtest, openvpn (networking).
  # meta-networking depends on meta-python, so both are enabled.
  # meta-filesystems is a meta-virtualization dependency (filesystems-layer).
  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    refspec: scarthgap
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:

  # meta-virtualization — provides crun, the small OCI runtime iot-containerd
  # drives. LAYERDEPENDS: core, meta-oe, meta-python, meta-networking,
  # meta-filesystems (all enabled above).
  meta-virtualization:
    url: https://git.yoctoproject.org/meta-virtualization
    refspec: scarthgap
    layers:
      meta-virtualization:

  # meta-raspberrypi — raspberrypi3-64 MACHINE, bootfiles, pi-bluetooth,
  # and the rpidistro onboard Wi-Fi/Bluetooth firmware.
  meta-raspberrypi:
    url: https://git.yoctoproject.org/meta-raspberrypi
    refspec: scarthgap
    layers:
      meta-raspberrypi:

# The iot layer is local (not fetched) — it lives in yocto/meta-iot/
# relative to the repo root. When running via build.sh, the repo is
# mounted at /work inside the kas container, so the absolute path is
# /work/yocto/meta-iot.

# Build configuration
local_conf_header:
  iot-base: |
    # Build the custom iot-distro (meta-iot/conf/distro/iot-distro.conf) rather
    # than the poky reference distro. iot-distro owns distro policy, so
    # INIT_MANAGER=systemd and PACKAGE_CLASSES=package_ipk now live in that file
    # (removed from here to keep a single source of truth).
    DISTRO = "iot-distro"

    # Accept the CLOSED license for iot recipes, plus the rpidistro
    # Wi-Fi/Bluetooth firmware (synaptics-killswitch).
    LICENSE_FLAGS_ACCEPTED += "CLOSED synaptics-killswitch"

    # Empty root password for first-boot ssh. REMOVE for production.
    EXTRA_IMAGE_FEATURES ?= "debug-tweaks"

    # Serial console on the GPIO header (no-op on qemu machines).
    ENABLE_UART = "1"

    # Disable the local hash-equivalence server. Poky defaults BB_HASHSERVE to
    # a local "auto" server whose unihashes never match the upstream sstate
    # mirror's object names — so bitbake probes the mirror for thousands of
    # objects that all MISS (a long, hangy "Checking sstate mirror object
    # availability" phase, and a near-cold build). With OEBasicHash the task
    # hashes match the mirror, so probes hit and prebuilt sstate downloads.
    # (This is exactly what bitbake's own warning recommends.)
    BB_HASHSERVE = ""
    BB_SIGNATURE_HANDLER = "OEBasicHash"

    # Upstream shared-state mirror — download prebuilt sstate for stock
    # recipes (kernel, base distro, toolchain, ...) instead of compiling them
    # on a cold build. Best-effort: bitbake builds anything the mirror lacks,
    # and a local sstate-cache still takes precedence. Coverage varies by
    # release (scarthgap) / MACHINE. Requires BB_HASHSERVE="" above to match.
    SSTATE_MIRRORS ?= "file://.* http://sstate.yoctoproject.org/all/PATH;downloadfilename=PATH"

bblayers_conf_header:
  meta-iot: |
    BBLAYERS += "${TOPDIR}/../meta-iot"

# Target machine — override via MACHINE env var or --target
machine: "${MACHINE:-raspberrypi3-64}"

# Target recipe to build — the full bootable distribution.
target:
  - iot-image
