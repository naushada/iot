# kas-iot.yml — Yocto build configuration for the iot LwM2M stack
#
# Uses kas (https://github.com/siemens/kas) to fetch all layers and
# drive bitbake. This is an alternative to the Containerfile/entrypoint.sh
# build path that build.sh uses by default; the two are kept in sync.
#
#   kas build yocto/kas-iot.yml                       # raspberrypi3-64
#   MACHINE=qemuarm64 kas build yocto/kas-iot.yml     # ARM64 (qemu)
#
# Supported machines:
#   raspberrypi3-64  Raspberry Pi 3B (64-bit, default)
#   qemuarm64        ARM64 / aarch64 (qemu)
#   qemux86-64       x86-64 (qemu, CI verification)
#
# Default target `iot-image` is the full bootable distribution. For just
# the .ipk feed, run `kas build yocto/kas-iot.yml:packagegroup-iot`.

header:
  version: 14

# Default values — override via environment or --target
defaults:
  repos:
    refspec: scarthgap

# Layer repositories fetched by kas
repos:
  # Poky — the Yocto reference distro
  poky:
    url: https://git.yoctoproject.org/poky
    refspec: scarthgap
    layers:
      meta:
      meta-poky:

  # meta-openembedded — lua, nlohmann-json, gtest, openvpn (networking).
  # meta-networking depends on meta-python, so both are enabled.
  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    refspec: scarthgap
    layers:
      meta-oe:
      meta-python:
      meta-networking:

  # meta-raspberrypi — raspberrypi3-64 MACHINE, bootfiles, pi-bluetooth,
  # and the rpidistro onboard Wi-Fi/Bluetooth firmware.
  meta-raspberrypi:
    url: https://git.yoctoproject.org/meta-raspberrypi
    refspec: scarthgap
    layers:
      meta-raspberrypi:

# The iot layer is local (not fetched) — it lives in yocto/meta-iot/
# relative to the repo root. When running via build.sh, the repo is
# mounted at /work inside the kas container, so the absolute path is
# /work/yocto/meta-iot.

# Build configuration
local_conf_header:
  iot-base: |
    # Accept the CLOSED license for iot recipes, plus the rpidistro
    # Wi-Fi/Bluetooth firmware (synaptics-killswitch).
    LICENSE_FLAGS_ACCEPTED += "CLOSED synaptics-killswitch"

    # Systemd as init manager (required for DynamicUser=, RuntimeDirectory=)
    INIT_MANAGER = "systemd"

    # .ipk packages → on-target opkg + a flat ipk feed under tmp/deploy/ipk
    # so iot-*.ipk can be installed over ssh.
    PACKAGE_CLASSES = "package_ipk"

    # Empty root password for first-boot ssh. REMOVE for production.
    EXTRA_IMAGE_FEATURES ?= "debug-tweaks"

    # Serial console on the GPIO header (no-op on qemu machines).
    ENABLE_UART = "1"

bblayers_conf_header:
  meta-iot: |
    BBLAYERS += "${TOPDIR}/../meta-iot"

# Target machine — override via MACHINE env var or --target
machine: "${MACHINE:-raspberrypi3-64}"

# Target recipe to build — the full bootable distribution.
target:
  - iot-image
