# iot-distro — the distribution policy for the iot LwM2M/CoAP device image.
#
# WHY a custom distro instead of building the `poky` reference distro:
#   * poky is Yocto's *reference* distro — it advertises itself as such and is
#     explicitly "not for production". Owning our own DISTRO stops that class of
#     nag and gives us ONE file that defines distro policy, instead of the same
#     policy scattered across entrypoint.sh / kas-iot.yml local.conf headers.
#   * A DISTRO is the correct home for *capability* policy: init manager, package
#     format, and DISTRO_FEATURES (the wifi/bluetooth/systemd/... switches).
#     It is NOT the home for build-host or per-build concerns — thread counts,
#     rm_work, sstate mirrors, MACHINE, IOT_AB. Those stay in entrypoint.sh.
#
# Selection: builds set `DISTRO = "iot-distro"` in local.conf (entrypoint.sh and
# kas-iot.yml do this). bitbake then resolves this file via BBPATH — meta-iot's
# layer.conf appends LAYERDIR to BBPATH, so conf/distro/iot-distro.conf is found.
#
# Strategy: derive from poky (require it below), then override only what we own.
# v1 is behaviourally identical to the old poky build except for the rename and
# the folded-in INIT_MANAGER/PACKAGE_CLASSES — so the first image boots exactly
# like today. DISTRO_FEATURES trimming is staged (commented) at the bottom and
# applied only after a verified boot, one feature at a time.

# ── Inherit poky's behaviour as the baseline ───────────────────────────
# Pulls in the default DISTRO_FEATURES, SANITY_TESTED_DISTROS, SDK vars, the
# preferred-version pins, etc. Everything below overrides on top of this.
require conf/distro/poky.conf

# ── Distro identity ────────────────────────────────────────────────────
# Override AFTER the require (poky.conf sets DISTRO = "poky").
DISTRO = "iot-distro"
DISTRO_NAME = "IoT Distro"
MAINTAINER = "iot <naushad.dln@gmail.com>"

# DISTRO_VERSION is deliberately left as poky's (the Yocto release string) so it
# tracks the upstream base and does NOT become a 4th product-version spot to bump
# at release-cut time (/VERSION + iot_git.bb PV + iot-bundle.bb PV already exist).

# ── Distro capability policy (folded in from local.conf) ───────────────
# systemd as init manager — required for DynamicUser=, RuntimeDirectory=,
# StateDirectory= used throughout the iot units. This is distro identity, not a
# per-build knob, so it lives here now (was written to local.conf per build).
INIT_MANAGER = "systemd"

# .ipk packages → on-target opkg + a flat ipk feed under tmp/deploy/ipk, so
# iot-*.ipk can be scp'd and `opkg install`ed over ssh, and the OTA bundle can
# pick .ipk files up. (Poky defaults to rpm; without this the ipk feed the
# deploy scripts reference is never built.) Also distro identity.
PACKAGE_CLASSES = "package_ipk"

# ── DISTRO_FEATURES (STAGED TRIM — not yet applied) ────────────────────
# v1 keeps poky's DISTRO_FEATURES verbatim so behaviour is unchanged. The RPi3B
# bring-up depends on wifi + bluetooth (firmware) and systemd; the stack has no
# display, so x11/wayland/opengl and the legacy 3g/nfc/pcmcia features are dead
# weight. Trim them ONLY after a verified boot, uncommenting one line at a time
# and reflashing between — a dropped feature can silently disable wifi/systemd
# and the failure only surfaces on HW after a long rebuild.
#
# DISTRO_FEATURES:remove = "x11 wayland opengl 3g nfc pcmcia"
