# meta-iot — Yocto layer for the iot LwM2M 1.1.1 stack
#
# Provides recipes for lwm2m, ds-server, ds-cli, openvpn-client,
# net-router, wifi-client, and their third-party dependencies
# (ACE_TAO 7.0.0, tinydtls, mongo-c/cxx drivers).
#
# Layer dependencies: poky (core) + meta-openembedded (openembedded-layer).
# Target Yocto release: Scarthgap (5.0 LTS).

# Add this layer's root to BBPATH. Without it the layer still parses (BBFILES
# below uses absolute ${LAYERDIR} paths), but anything that searches BBPATH
# misses us — notably wic's WKS_SEARCH_PATH ("<BBPATH>/wic"), so a wks shipped
# in meta-iot/wic/ (the IOT_AB=1 iot-ab.wks.in) is "not found" at do_image_wic.
BBPATH .= ":${LAYERDIR}"

BBFILE_COLLECTIONS += "iot"
BBFILE_PATTERN_iot := "^${LAYERDIR}/"
BBFILE_PRIORITY_iot = "6"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

# RAUC A/B recipes (rauc-conf.bbappend + update-bundle.bb) are parsed ONLY when
# the meta-rauc layer (collection "rauc") is present — i.e. an IOT_AB=1 build.
# Without this guard those appends would dangle on a default build (no
# meta-rauc → bitbake errors on an append with no matching recipe).
BBFILES_DYNAMIC += " \
    rauc:${LAYERDIR}/dynamic-layers/rauc/recipes-*/*/*.bb \
    rauc:${LAYERDIR}/dynamic-layers/rauc/recipes-*/*/*.bbappend \
"

LAYERDEPENDS_iot = "core openembedded-layer"
LAYERSERIES_COMPAT_iot = "scarthgap"

LICENSE_PATH += "${LAYERDIR}/recipes-iot/lwm2m/files"
