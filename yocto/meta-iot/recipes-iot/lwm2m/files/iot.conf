# tmpfiles.d entry for the iot runtime directory.
#
# This is the SOLE owner of /run/iot. The systemd units deliberately do NOT use
# RuntimeDirectory=iot: multiple DynamicUser units sharing one RuntimeDirectory=
# caused /run/iot (and ds-server's live socket) to be removed whenever any of
# them stopped or crash-looped, and broke ds-server's own restart. systemd-
# tmpfiles creates this once at boot (sysinit, before any iot service starts)
# and never removes it.
#
# /run/iot is 2775 root:iot: setgid so files created inside inherit group `iot`,
# and group-writable so the ds-server / wifi / openvpn / net-router / httpd
# DynamicUsers (all SupplementaryGroups=iot) can create the 0660 group-iot
# socket and the OTA spool.
#
# /var/lib/iot is intentionally NOT created here — ds-server's StateDirectory=iot
# owns it. Pre-creating it as a "public" dir made systemd migrate it to
# /var/lib/private/iot on every boot (DynamicUser state churn).
#
# Type Path                Mode UID  GID Age Argument
d      /run/iot            2775 root iot  -   -
# 0775 root:iot so the iot-httpd DynamicUser (SupplementaryGroups=iot) can drop a
# drag-and-drop OTA .ipk + the trigger here; root iot-swupdate then installs it.
d      /run/iot/update     0775 root iot  -   -
# wpa_supplicant control-socket dir for wifi-client (--ctrl-dir=/run/wpa_supplicant).
# wifi-client runs as a DynamicUser and can't mkdir under root-owned /run, so
# wpa_supplicant fails to create its ctrl socket and never associates. Create it
# here (2775 root:iot) so the iot-group DynamicUser can drop the socket.
d      /run/wpa_supplicant 2775 root iot  -   -
# VPN credential dir. The lwm2m client (runs as `engineer`) writes the
# bootstrap-delivered CA + client cert/key here via LwM2M Object 2048; without
# this dir the write fails ENOENT and the device never gets VPN certs. The
# openvpn-client (DynamicUser + SupplementaryGroups=iot) reads them. 2750
# engineer:iot — engineer owns + writes, setgid so files inherit group iot, and
# group r-x lets openvpn traverse + read (the key is written group-readable).
d      /etc/iot/vpn        2750 engineer iot - -
# Container runtime store for iot-containerd (runs as root). Dedicated top-level
# dirs — deliberately NOT under /var/lib/iot (ds-server's DynamicUser
# StateDirectory=iot, which systemd would migrate to /var/lib/private/iot) nor
# under the group-iot /run/iot. 0700 root:root: only the root daemon needs them.
# /var/lib/iot-containers persists pulled images/layers; /run/iot-containers
# holds the ephemeral overlay merged-rootfs + OCI bundle (lost on reboot).
d      /var/lib/iot-containers 0700 root root - -
d      /run/iot-containers     0700 root root - -
