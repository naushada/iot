name: Release build (full image + OTA bundle)

# Cuts the device-side release artifacts when a release branch is pushed:
#   - the FULL bootable Yocto image  (iot-image → *.wic.bz2, flash to SD)
#   - the OTA .ipk bundle            (iot-bundle → *.tar.gz, push over LwM2M Obj 5)
# Both carry the RELEASE BRANCH's code: the iot recipe fetches its source from
# IOT_BRANCH, so we pin it to the triggering branch (github.ref_name) — without
# this the build would ship `main` (the recipe default).
#
# Triggered when a `release/**` branch is pushed (i.e. when you cut/update a
# release branch), or manually via workflow_dispatch from that branch. v* TAGS
# are handled by the existing ipk-bundle.yml / rauc-bundle.yml / release-image.yml
# (which attach RELEASE ASSETS) — kept separate so a tag doesn't double-build.
#
# Heavy containerized Yocto build → relies on the published sstate cache image
# (IOT_USE_CACHE=1). Secrets: DOCKERHUB_USERNAME / DOCKERHUB_TOKEN.
#
# 2026-07-12 — WHY THE FULL IMAGE IS NOW OPT-IN:
# The sstate cache image was never actually published (the cache-publish
# workflow demanded a larger runner nobody had), so IOT_USE_CACHE=1 silently
# missed and every build ran FROM SCRATCH. A from-scratch full image does not
# fit the 6h hosted-runner cap — so this workflow spent ~6h on a job that could
# only ever time out, on every single release push, while the OTA bundle (the
# artifact we actually flash) built fine alongside it.
# Now: a release-branch push builds ONLY the OTA bundle. Ask for the full image
# explicitly (workflow_dispatch → full_image=true), once a cache floor exists or
# on a larger runner. Publish the floor with cache-publish.yml (target=iot-bundle
# is enough for the OTA path and runs on a standard runner).

on:
  push:
    branches: ['release/**']
  workflow_dispatch:
    inputs:
      machine:
        description: Target MACHINE
        default: raspberrypi3-64
        required: false
      full_image:
        description: >-
          Also build the FULL bootable image (.wic.bz2). Needs a published sstate
          cache floor or a larger runner — from scratch it exceeds the 6h cap.
        type: boolean
        default: false
        required: false
      ab:
        description: "RAUC A/B image (u-boot + 4-partition wic). Off = single-rootfs."
        type: boolean
        default: false
        required: false

env:
  MACHINE: ${{ github.event.inputs.machine || 'raspberrypi3-64' }}
  # The branch this run is on (the release branch). The iot recipe fetches its
  # source from here, so the artifacts carry release code, not main.
  IOT_BRANCH: ${{ github.ref_name }}
  # A/B (RAUC) toggle. '1' → build.sh adds the RAUC layers + entrypoint writes the
  # u-boot/4-partition local.conf (WKS_FILE=iot-ab.wks.in); empty → single-rootfs.
  # Only the manual (workflow_dispatch) form can request A/B — release-branch
  # pushes leave the input undefined, so they stay single-rootfs.
  IOT_AB: ${{ github.event.inputs.ab == 'true' && '1' || '' }}

jobs:
  full-image:
    name: Full image (iot-image → .wic.bz2)
    runs-on: ubuntu-22.04
    # Opt-in only: from scratch this cannot finish inside the 6h cap, and until
    # a cache floor is published every run IS from scratch. A release-branch push
    # therefore builds the OTA bundle only.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_image }}
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h /
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build full bootable image
        working-directory: yocto
        env:
          TARGET: iot-image
          IOT_USE_CACHE: "1"
          IOT_FRESH: "1"     # clean re-fetch of the release branch (no stale mirror)
        run: ./build.sh "${MACHINE}"
      - name: Collect image
        run: |
          mkdir -p dist
          found=$(find "yocto/build/${MACHINE}" -name '*.wic.bz2' -type f | head -1)
          [ -n "$found" ] || { echo "no *.wic.bz2 produced"; exit 1; }
          cp -v "$found" "dist/"
          ( cd dist && sha256sum *.wic.bz2 > SHA256SUMS )
          ls -l dist/
      - uses: actions/upload-artifact@v4
        with:
          name: iot-image-${{ env.MACHINE }}
          path: dist/

  iot-bundle:
    name: OTA bundle (iot-bundle → .tar.gz)
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h /
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build OTA bundle
        working-directory: yocto
        env:
          TARGET: iot-bundle
          IOT_USE_CACHE: "1"
          IOT_FRESH: "1"
        run: ./build.sh "${MACHINE}"
      - name: Collect bundle + sha + manifest row
        run: |
          mkdir -p dist
          found=$(find "yocto/build/${MACHINE}" -name 'iot-bundle-*.tar.gz' -type f | head -1)
          [ -n "$found" ] || { echo "no iot-bundle tarball produced"; exit 1; }
          base="$(basename "$found")"
          cp -v "$found"                 "dist/${base}"
          cp -v "${found}.sha256"        "dist/${base}.sha256"        || true
          cp -v "${found}.manifest.json" "dist/${base}.manifest.json" || true
          ls -l dist/
      - uses: actions/upload-artifact@v4
        with:
          name: iot-bundle-${{ env.MACHINE }}
          path: dist/
