name: Release Cloud Image

# Publishes the :stable tag (+ the version tags) ONLY on a git-tag release,
# e.g. `git tag v1.2.0 && git push origin v1.2.0`. The host's Watchtower
# watches :stable, so this is what triggers an auto-deploy to Contabo.
# Everyday main commits keep moving :latest (see cloud-image.yml); they do
# NOT touch :stable and so do NOT auto-deploy.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:   # manual: republish :stable from the current ref

env:
  IMAGE_NAME: naushada/iot-cloud

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (release tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # :stable always; X.Y.Z and X.Y only when triggered by a vX.Y.Z tag.
          tags: |
            type=raw,value=stable
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/cloud/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
