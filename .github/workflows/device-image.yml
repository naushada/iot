name: Build & Push Device Image

# Builds and publishes the device-iot image (LwM2M client + device UI) so
# it can be pulled for testing instead of built locally. Same trigger model
# as cloud-image.yml: main pushes that touch code (not docs-only).
on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'modules/**'
      - 'yocto/**'
      - '.github/workflows/device-image.yml'
      - '!**/*.md'
  workflow_dispatch:  # manual trigger

env:
  IMAGE_NAME: naushada/iot-device

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU   # enables cross-building the arm64 image on the amd64 runner
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/device/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
